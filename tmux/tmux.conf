# --------------------------------------------------------------------------------------------------------------------------
# CONFIGURATION
# --------------------------------------------------------------------------------------------------------------------------

# Use Vi mode
setw -g mode-keys vi

# Increase scrollback buffer size
set -g history-limit 10000

# Allow automatic renaming of windows
set -g allow-rename on

# Renumber windows when one is removed
set -g renumber-windows on

# improve colors
set -g default-terminal "${TERM}"
# set -g default-terminal "tmux-256color"

# use true colors
# set -ga terminal-overrides ',xterm-256color:Tc'

# Enable undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# set -as terminal-overrides ',xterm*:sitm=\E[3m'

# Enable undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Allow mouse to resize windows and select tabs
set -g mouse on

# Allow tmux to set terminal title
set -g set-titles on

# Monitor window activity to display in status bar
setw -g monitor-activity on

# A bell in another window should cause a bell in the current window
set -g bell-action any

# Don't show distracting notifications
set -g visual-bell off
set -g visual-activity off

# Focus events enabled for terminals that support them
set -g focus-events on

# OSC52 clipboard passthrough (lets nvim/apps write to system clipboard through tmux)
set -g set-clipboard on

# Useful when using sharing a session with different size terminals
setw -g aggressive-resize on

# For image.nvim
set -gq allow-passthrough on
set -g visual-activity off

# --------------------------------------------------------------------------------------------------------------------------
# KEY BINDINGS
# --------------------------------------------------------------------------------------------------------------------------

# Set prefix to Ctrl-a
set -g prefix C-a
# Send prefix to a nested tmux session by doubling the prefix
bind C-a send-prefix

# 'PREFIX r' to reload of the config file
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# Allow holding Ctrl when using using prefix+p/n for switching windows
bind C-p previous-window
bind C-n next-window

# pane movement shortcuts (same as vim)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# pane resizing
bind -r Left resize-pane -L
bind -r Down resize-pane -D
bind -r Up resize-pane -U
bind -r Right resize-pane -R

# Smart pane switching with awareness of vim splits
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Switch between two most recently used windows
bind Space last-window

bind "=" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"

# Change the path for newly created windows
bind c new-window -c "#{pane_current_path}"

bind S new-session

# Switch between two most recently used sessions
bind q switch-client -l

# Kill current session and switch to next available
bind-key K run-shell ' \
  if [ "$(tmux list-sessions | wc -l)" -gt 1 ]; then \
      tmux switch-client -n; \
  fi; \
  tmux kill-session -t "#S"'

# Create clone as session group for current session
bind-key C run-shell 'tmux new-session -d -t "#S" -s "#S-clone"'

bind > swap-window -t +1
bind < swap-window -t -1

# bind y run -b "tmux show-buffer | xclip -selection clipboard"\; display-message "Copied tmux buffer to system clipboard"
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection                # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle             # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"  # Yank selection in copy mode.

# --------------------------------------------------------------------------------------------------------------------------
# STATUS LINE
# --------------------------------------------------------------------------------------------------------------------------

set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 1

# transparent
set -g status-style         "bg=default"
set -g status-left-style    "bg=default"
set -g status-right-style   "bg=default"

# content
set -g status-left  "  #{session_name}   "
set -g status-right "  #{@flow}  %a %d.%m.%Y %H:%M:%S  "

# inactive windows
set -g window-status-style          "fg=#6e6f70 bg=default"
set -g window-status-format         " #{window_index}:#{window_name} "
set -g window-status-activity-style "none"

# active window
set -g window-status-current-style  "fg=#a0a5eb,bold,bg=default"
set -g window-status-current-format " #{window_index}:#{window_name} "

# pane borders
set -g pane-border-style        "fg=#5c5f87"
set -g pane-active-border-style "fg=#7b7fb5"

# 3-row status: top padding, content, bottom border
set -g status 2
set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-format[1] "#[fg=#5c5f87]───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"

# flow timer toggle
bind-key F run-shell "if [ -f ~/.flow.pid ]; then flow stop; else flow -daemon -work 30 -break 5; fi > /dev/null 2>&1"

# x window
bind L new-window -a -n "x" "x"

set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @ukiyo-theme 'tokyonight/night'
